name: Provision App on Dev, Test and Prod Postgres Servers

concurrency:
  group: postgres-provision-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Base application name (e.g. myapp)"
        required: true
        type: string
      dev_action:
        description: "Dev: skip / create / reset"
        required: true
        type: choice
        default: skip
        options: [skip, create, reset]
      dev_password:
        description: "Password for dev user (required unless skip)"
        required: false
      test_action:
        description: "Test: skip / create / reset"
        required: true
        type: choice
        default: skip
        options: [skip, create, reset]
      test_password:
        description: "Password for test user (required unless skip)"
        required: false
      prod_action:
        description: "Prod: skip / create / reset"
        required: true
        type: choice
        default: skip
        options: [skip, create, reset]
      prod_password:
        description: "Password for prod user (required unless skip)"
        required: false

jobs:
  provision:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - server: dev
            env_name: dev
            host: ${{ vars.DEV_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: DEV_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.DEV_FIREWALL_NAME }}
          - server: test
            env_name: test
            host: ${{ vars.TEST_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: TEST_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.TEST_FIREWALL_NAME }}
          - server: prod
            env_name: prod
            host: ${{ vars.PROD_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: PROD_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.PROD_FIREWALL_NAME }}

    steps:
      - name: Resolve action for this environment
        id: resolve
        env:
          ENV_NAME: ${{ matrix.env_name }}
          DEV_ACTION: ${{ inputs.dev_action }}
          TEST_ACTION: ${{ inputs.test_action }}
          PROD_ACTION: ${{ inputs.prod_action }}
        shell: bash
        run: |
          set -euo pipefail
          case "${ENV_NAME}" in
            dev)  ACTION="${DEV_ACTION}" ;;
            test) ACTION="${TEST_ACTION}" ;;
            prod) ACTION="${PROD_ACTION}" ;;
          esac
          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo ">> ${ENV_NAME}: action=${ACTION}"

      - name: Skip — nothing to do for ${{ matrix.env_name }}
        if: steps.resolve.outputs.action == 'skip'
        shell: bash
        run: echo ">> Skipping ${{ matrix.env_name }} (action=skip)"

      - name: Validate inputs
        if: steps.resolve.outputs.action != 'skip'
        env:
          APP_NAME: ${{ inputs.app_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${APP_NAME}" =~ ^[a-z][a-z0-9_]{0,62}$ ]]; then
            echo "::error::app_name darf nur Kleinbuchstaben, Ziffern und Unterstriche enthalten (max 63 Zeichen)"
            exit 1
          fi

      - name: Validate password provided
        if: steps.resolve.outputs.action != 'skip'
        env:
          ENV_NAME: ${{ matrix.env_name }}
          DEV_PASSWORD: ${{ inputs.dev_password }}
          TEST_PASSWORD: ${{ inputs.test_password }}
          PROD_PASSWORD: ${{ inputs.prod_password }}
        shell: bash
        run: |
          set -euo pipefail
          case "${ENV_NAME}" in
            dev)  PW="${DEV_PASSWORD}" ;;
            test) PW="${TEST_PASSWORD}" ;;
            prod) PW="${PROD_PASSWORD}" ;;
          esac
          if [[ -z "${PW}" ]]; then
            echo "::error::Password for ${ENV_NAME} is required when action is not 'skip'"
            exit 1
          fi

      - name: Install Civo CLI
        if: steps.resolve.outputs.action != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          curl -Ls https://civo.com/get | sh

      - name: Add Civo API key
        if: steps.resolve.outputs.action != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          civo apikey save ci-civo "$CIVO_API_KEY"
        env:
          CIVO_API_KEY: ${{ secrets.CIVO_API_KEY }}

      - name: Detect runner public IPv4
        if: steps.resolve.outputs.action != 'skip'
        id: detect_ip
        shell: bash
        run: |
          set -euo pipefail

          is_ipv4() {
            [[ "$1" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]] || return 1
            IFS='.' read -r a b c d <<< "$1"
            [[ $a -le 255 && $b -le 255 && $c -le 255 && $d -le 255 ]]
          }

          IP="$(
            (
              curl -fsSL https://api.ipify.org \
              || curl -fsSL https://ipv4.icanhazip.com \
              || curl -fsSL https://ifconfig.me \
              || (dig +short -4 TXT o-o.myaddr.l.google.com @ns1.google.com | tr -d '"')
            ) 2>/dev/null | tr -d '\n'
          )"

          if ! is_ipv4 "${IP:-}"; then
            echo "Konnte öffentliche IPv4 nicht ermitteln." >&2
            exit 1
          fi

          echo "Runner IPv4: ${IP}"
          echo "ip=${IP}" >> "$GITHUB_OUTPUT"

      - name: Temporär Port 5432 öffnen
        if: steps.resolve.outputs.action != 'skip'
        env:
          FIREWALL_NAME: ${{ matrix.firewall_name }}
        shell: bash
        run: |
          set -euo pipefail
          civo region use fra1 || true
          SRC_CIDR="${{ steps.detect_ip.outputs.ip }}/32"
          LABEL="tmp-gha-${GITHUB_RUN_ID}"
          echo "Erlaube TCP 5432 von ${SRC_CIDR} in Firewall ${FIREWALL_NAME}"
          civo firewall rule create "$FIREWALL_NAME" \
            -s 5432 \
            -c "${SRC_CIDR}" \
            -l "${LABEL}"

      - name: Install psql client
        if: steps.resolve.outputs.action != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check pre-existing state
        if: steps.resolve.outputs.action != 'skip'
        id: pre_state
        env:
          APP_NAME: ${{ inputs.app_name }}
          HOST: ${{ matrix.host }}
          PORT: ${{ matrix.port }}
          ADMIN_USER: ${{ matrix.admin_user }}
          ADMIN_PW: ${{ secrets[matrix.admin_secret] }}
          ENV_NAME: ${{ matrix.env_name }}
          PGSSLMODE: require
        shell: bash
        run: |
          set -euo pipefail

          APP_USER="${APP_NAME}_user"
          APP_DB="${APP_NAME}_db"

          sql_literal() { printf "%s" "$1" | sed "s/'/''/g"; }
          Q_APP_USER="$(sql_literal "${APP_USER}")"
          Q_APP_DB="$(sql_literal "${APP_DB}")"

          export PGPASSWORD="${ADMIN_PW}"
          ADMIN_USER="${ADMIN_USER:-postgres}"
          CONN_ADMIN="host=${HOST} port=${PORT} user=${ADMIN_USER} dbname=postgres sslmode=require connect_timeout=20"

          echo ">> checking pre-existing state on ${HOST}:${PORT} (${ENV_NAME})"

          ROLE_PRE_EXISTS=$(psql "${CONN_ADMIN}" -t -A -c \
            "SELECT CASE WHEN EXISTS(SELECT FROM pg_roles WHERE rolname = '${Q_APP_USER}') THEN 'true' ELSE 'false' END")
          DB_PRE_EXISTS=$(psql "${CONN_ADMIN}" -t -A -c \
            "SELECT CASE WHEN EXISTS(SELECT FROM pg_database WHERE datname = '${Q_APP_DB}') THEN 'true' ELSE 'false' END")

          echo "ROLE_PRE_EXISTS=${ROLE_PRE_EXISTS}" > "pre_state_${ENV_NAME}.txt"
          echo "DB_PRE_EXISTS=${DB_PRE_EXISTS}" >> "pre_state_${ENV_NAME}.txt"
          echo ">> pre-state: role_existed=${ROLE_PRE_EXISTS}, db_existed=${DB_PRE_EXISTS}"

          echo "db_pre_exists=${DB_PRE_EXISTS}" >> "$GITHUB_OUTPUT"

      - name: Upload pre-state artifact
        if: always() && steps.resolve.outputs.action != 'skip'
        uses: actions/upload-artifact@v4
        with:
          name: pre-state-${{ matrix.env_name }}
          path: pre_state_${{ matrix.env_name }}.txt
          if-no-files-found: ignore

      - name: Provision app on ${{ matrix.server }} (${{ matrix.host }}:${{ matrix.port }})
        if: steps.resolve.outputs.action != 'skip'
        env:
          APP_NAME: ${{ inputs.app_name }}
          HOST: ${{ matrix.host }}
          PORT: ${{ matrix.port }}
          ADMIN_USER: ${{ matrix.admin_user }}
          ADMIN_PW: ${{ secrets[matrix.admin_secret] }}
          ENV_NAME: ${{ matrix.env_name }}
          PGSSLMODE: require
          DEV_PASSWORD: ${{ inputs.dev_password }}
          TEST_PASSWORD: ${{ inputs.test_password }}
          PROD_PASSWORD: ${{ inputs.prod_password }}
          DB_PRE_EXISTS: ${{ steps.pre_state.outputs.db_pre_exists }}
          ACTION: ${{ steps.resolve.outputs.action }}
        shell: bash
        run: |
          set -euo pipefail

          # Passwörter maskieren
          for pw in "${DEV_PASSWORD}" "${TEST_PASSWORD}" "${PROD_PASSWORD}"; do
            [[ -n "${pw}" ]] && echo "::add-mask::${pw}"
            [[ -n "${pw}" ]] && echo "::add-mask::$(printf %s "${pw}" | tr -d '\r\n')"
          done

          ADMIN_USER="${ADMIN_USER:-postgres}"

          if [[ -z "${APP_NAME}" || -z "${HOST}" || -z "${ADMIN_PW}" ]]; then
            echo "Missing required inputs"; exit 1
          fi

          case "${ENV_NAME}" in
            dev)  APP_PW="${DEV_PASSWORD}" ;;
            test) APP_PW="${TEST_PASSWORD}" ;;
            prod) APP_PW="${PROD_PASSWORD}" ;;
            *) echo "Unknown ENV_NAME '${ENV_NAME}'"; exit 1 ;;
          esac

          echo "::add-mask::${APP_PW}"
          echo "::add-mask::$(printf %s "${APP_PW}" | tr -d '\r\n')"

          APP_USER="${APP_NAME}_user"
          APP_DB="${APP_NAME}_db"

          echo "=== ${ACTION} ${APP_NAME} on ${HOST}:${PORT} as ${ADMIN_USER} (${ENV_NAME}) ==="

          sql_literal() { printf "%s" "$1" | sed "s/'/''/g"; }
          Q_APP_USER="$(sql_literal "${APP_USER}")"
          Q_APP_PW="$(sql_literal "${APP_PW}")"
          Q_APP_DB="$(sql_literal "${APP_DB}")"

          export PGPASSWORD="${ADMIN_PW}"
          CONN_ADMIN="host=${HOST} port=${PORT} user=${ADMIN_USER} dbname=postgres sslmode=require connect_timeout=20"

          psql_exec() {
            psql "$1" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "$2"
          }

          psql_exec_retry() {
            local conn="$1"; shift
            local sql="$1"
            local tries=5
            local delay=20
            local i
            for i in $(seq 1 "${tries}"); do
              if psql_exec "${conn}" "${sql}"; then
                return 0
              fi
              if (( i < tries )); then
                echo "psql failed (attempt ${i}/${tries}); retrying in ${delay}s ..."
                sleep "${delay}"
              fi
            done
            echo "psql failed after ${tries} attempts."
            return 1
          }

          echo ">> ensure role ${APP_USER}"
          psql_exec_retry "${CONN_ADMIN}" "
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${Q_APP_USER}') THEN
              EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${Q_APP_USER}', '${Q_APP_PW}');
            ELSE
              EXECUTE format('ALTER ROLE %I WITH ENCRYPTED PASSWORD %L', '${Q_APP_USER}', '${Q_APP_PW}');
            END IF;
          END
          \$\$;
          "

          echo ">> ensure database ${APP_DB} (action=${ACTION})"
          case "${ACTION}" in
            create)
              if [[ "${DB_PRE_EXISTS}" == "false" ]]; then
                psql_exec_retry "${CONN_ADMIN}" "CREATE DATABASE \"${APP_DB}\" ENCODING 'UTF8' TEMPLATE template1"
              else
                echo ">> database ${APP_DB} already exists — keeping as-is (action=create)"
              fi
              ;;
            reset)
              if [[ "${DB_PRE_EXISTS}" == "true" ]]; then
                echo ">> database ${APP_DB} exists — dropping and recreating (action=reset)"
                echo ">> terminating active connections"
                psql_exec_retry "${CONN_ADMIN}" \
                  "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '${Q_APP_DB}' AND pid <> pg_backend_pid();"
                psql_exec_retry "${CONN_ADMIN}" "DROP DATABASE \"${APP_DB}\""
              fi
              psql_exec_retry "${CONN_ADMIN}" "CREATE DATABASE \"${APP_DB}\" ENCODING 'UTF8' TEMPLATE template1"
              echo ">> database ${APP_DB} ready"
              ;;
          esac

          echo ">> grant database privileges (CONNECT, TEMP, CREATE) to ${APP_USER} on ${APP_DB}"
          psql_exec_retry "${CONN_ADMIN}" "
            GRANT CONNECT, TEMP, CREATE ON DATABASE \"${APP_DB}\" TO \"${APP_USER}\";
          "

          echo ">> done (${ACTION})"

          JDBC="jdbc:postgresql://${HOST}:${PORT}/${APP_DB}?sslmode=require&connectTimeout=10&socketTimeout=45&tcpKeepAlive=true"
          echo "${ENV_NAME}-database|${HOST}:${PORT}|${APP_NAME}_user|${APP_NAME}_db|public|${ACTION}|${JDBC}" > "summary_row_${ENV_NAME}.txt"

      - name: Upload summary artifact
        if: steps.resolve.outputs.action != 'skip'
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.env_name }}
          path: summary_row_${{ matrix.env_name }}.txt

      - name: Temporäre Regel entfernen
        if: always() && steps.resolve.outputs.action != 'skip'
        env:
          CIVO_API_KEY: ${{ secrets.CIVO_API_KEY }}
          FIREWALL_NAME: ${{ matrix.firewall_name }}
        shell: bash
        run: |
          set -euo pipefail
          command -v civo >/dev/null || exit 0
          civo region use fra1 || true
          mapfile -t rule_ids < <(
            civo firewall rule ls "$FIREWALL_NAME" --output json \
            | jq -r --arg lbl "tmp-gha-${GITHUB_RUN_ID}" '.[] | select(.label == $lbl) | .id'
          )
          for rid in "${rule_ids[@]}"; do
            [[ -n "$rid" ]] && civo firewall rule remove "$FIREWALL_NAME" "$rid" --yes
          done


  rollback:
    needs: provision
    if: ${{ always() && needs.provision.result == 'failure' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - server: dev
            env_name: dev
            host: ${{ vars.DEV_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: DEV_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.DEV_FIREWALL_NAME }}
          - server: test
            env_name: test
            host: ${{ vars.TEST_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: TEST_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.TEST_FIREWALL_NAME }}
          - server: prod
            env_name: prod
            host: ${{ vars.PROD_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: PROD_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.PROD_FIREWALL_NAME }}

    steps:
      - name: Resolve action for this environment
        id: resolve
        env:
          ENV_NAME: ${{ matrix.env_name }}
          DEV_ACTION: ${{ inputs.dev_action }}
          TEST_ACTION: ${{ inputs.test_action }}
          PROD_ACTION: ${{ inputs.prod_action }}
        shell: bash
        run: |
          set -euo pipefail
          case "${ENV_NAME}" in
            dev)  ACTION="${DEV_ACTION}" ;;
            test) ACTION="${TEST_ACTION}" ;;
            prod) ACTION="${PROD_ACTION}" ;;
          esac
          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"

      - name: Skip — nothing to rollback for ${{ matrix.env_name }}
        if: steps.resolve.outputs.action == 'skip'
        shell: bash
        run: echo ">> Skipping rollback for ${{ matrix.env_name }} (was not provisioned)"

      - name: Install Civo CLI
        if: steps.resolve.outputs.action != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          curl -Ls https://civo.com/get | sh

      - name: Add Civo API key
        if: steps.resolve.outputs.action != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          civo apikey save ci-civo "$CIVO_API_KEY"
        env:
          CIVO_API_KEY: ${{ secrets.CIVO_API_KEY }}

      - name: Detect runner public IPv4
        if: steps.resolve.outputs.action != 'skip'
        id: detect_ip
        shell: bash
        run: |
          set -euo pipefail

          is_ipv4() {
            [[ "$1" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]] || return 1
            IFS='.' read -r a b c d <<< "$1"
            [[ $a -le 255 && $b -le 255 && $c -le 255 && $d -le 255 ]]
          }

          IP="$(
            (
              curl -fsSL https://api.ipify.org \
              || curl -fsSL https://ipv4.icanhazip.com \
              || curl -fsSL https://ifconfig.me \
              || (dig +short -4 TXT o-o.myaddr.l.google.com @ns1.google.com | tr -d '"')
            ) 2>/dev/null | tr -d '\n'
          )"

          if ! is_ipv4 "${IP:-}"; then
            echo "Konnte öffentliche IPv4 nicht ermitteln." >&2
            exit 1
          fi

          echo "Runner IPv4: ${IP}"
          echo "ip=${IP}" >> "$GITHUB_OUTPUT"

      - name: Temporär Port 5432 öffnen (Rollback)
        if: steps.resolve.outputs.action != 'skip'
        env:
          FIREWALL_NAME: ${{ matrix.firewall_name }}
        shell: bash
        run: |
          set -euo pipefail
          civo region use fra1 || true
          SRC_CIDR="${{ steps.detect_ip.outputs.ip }}/32"
          LABEL="tmp-gha-rb-${GITHUB_RUN_ID}"
          echo "Erlaube TCP 5432 von ${SRC_CIDR} in Firewall ${FIREWALL_NAME}"
          civo firewall rule create "$FIREWALL_NAME" \
            -s 5432 \
            -c "${SRC_CIDR}" \
            -l "${LABEL}"

      - name: Install psql client
        if: steps.resolve.outputs.action != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Download pre-state artifact
        if: steps.resolve.outputs.action != 'skip'
        id: download_state
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pre-state-${{ matrix.env_name }}
          path: pre-state

      - name: Rollback on ${{ matrix.server }} (${{ matrix.host }}:${{ matrix.port }})
        if: steps.resolve.outputs.action != 'skip' && steps.download_state.outcome == 'success'
        env:
          APP_NAME: ${{ inputs.app_name }}
          HOST: ${{ matrix.host }}
          PORT: ${{ matrix.port }}
          ADMIN_USER: ${{ matrix.admin_user }}
          ADMIN_PW: ${{ secrets[matrix.admin_secret] }}
          ENV_NAME: ${{ matrix.env_name }}
          PGSSLMODE: require
          ACTION: ${{ steps.resolve.outputs.action }}
        shell: bash
        run: |
          # Best-Effort Rollback: Fehler sammeln, nicht abbrechen
          set -uo pipefail

          APP_USER="${APP_NAME}_user"
          APP_DB="${APP_NAME}_db"

          sql_literal() { printf "%s" "$1" | sed "s/'/''/g"; }
          Q_APP_USER="$(sql_literal "${APP_USER}")"
          Q_APP_DB="$(sql_literal "${APP_DB}")"

          # Pre-State sicher einlesen (kein source)
          PRE_STATE_FILE="pre-state/pre_state_${ENV_NAME}.txt"
          if [[ ! -f "${PRE_STATE_FILE}" ]]; then
            echo "Kein Pre-State für ${ENV_NAME} — nichts zurückzurollen"
            exit 0
          fi

          ROLE_PRE_EXISTS=""
          DB_PRE_EXISTS=""
          while IFS='=' read -r k v; do
            case "$k" in
              ROLE_PRE_EXISTS) ROLE_PRE_EXISTS="$v" ;;
              DB_PRE_EXISTS)   DB_PRE_EXISTS="$v" ;;
            esac
          done < "${PRE_STATE_FILE}"

          if [[ ! "$ROLE_PRE_EXISTS" =~ ^(true|false)$ ]] || [[ ! "$DB_PRE_EXISTS" =~ ^(true|false)$ ]]; then
            echo "::error::Pre-State-Datei ungültig für ${ENV_NAME}"
            exit 1
          fi

          echo "=== Rollback ${APP_NAME} on ${HOST}:${PORT} (${ENV_NAME}, action was ${ACTION}) ==="
          echo ">> pre-state: role_existed=${ROLE_PRE_EXISTS}, db_existed=${DB_PRE_EXISTS}"

          export PGPASSWORD="${ADMIN_PW}"
          ADMIN_USER="${ADMIN_USER:-postgres}"
          CONN_ADMIN="host=${HOST} port=${PORT} user=${ADMIN_USER} dbname=postgres sslmode=require connect_timeout=20"

          rollback_failed=0
          DB_ACTION="übersprungen (existierte bereits)"
          ROLE_ACTION="übersprungen (existierte bereits)"

          # Bei action=reset wurde eine existierende DB gedroppt+recreated.
          # Rollback kann die alten Daten nicht wiederherstellen, nur die neu erstellte DB entfernen.
          # Bei action=create wurde nur erstellt wenn nicht vorhanden.

          if [[ "${DB_PRE_EXISTS}" == "false" ]] || [[ "${ACTION}" == "reset" ]]; then
            DB_NOW=$(psql "${CONN_ADMIN}" -t -A -c \
              "SELECT 1 FROM pg_database WHERE datname = '${Q_APP_DB}'" 2>/dev/null || echo "")
            if [[ "${DB_NOW}" == "1" ]]; then
              echo ">> Verbindungen zu ${APP_DB} trennen"
              psql "${CONN_ADMIN}" -c \
                "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '${Q_APP_DB}' AND pid <> pg_backend_pid();" || true
              echo ">> DROP DATABASE ${APP_DB}"
              if psql "${CONN_ADMIN}" --set=ON_ERROR_STOP=1 -c "DROP DATABASE \"${APP_DB}\";"; then
                DB_ACTION="gelöscht"
              else
                DB_ACTION="FEHLER beim Löschen"
                rollback_failed=1
              fi
            else
              DB_ACTION="übersprungen (existiert nicht)"
            fi
          fi

          if [[ "${ROLE_PRE_EXISTS}" == "false" ]]; then
            ROLE_NOW=$(psql "${CONN_ADMIN}" -t -A -c \
              "SELECT 1 FROM pg_roles WHERE rolname = '${Q_APP_USER}'" 2>/dev/null || echo "")
            if [[ "${ROLE_NOW}" == "1" ]]; then
              echo ">> DROP ROLE ${APP_USER}"
              if psql "${CONN_ADMIN}" --set=ON_ERROR_STOP=1 -c "DROP ROLE \"${APP_USER}\";"; then
                ROLE_ACTION="gelöscht (war neu erstellt)"
              else
                ROLE_ACTION="FEHLER beim Löschen"
                rollback_failed=1
              fi
            else
              ROLE_ACTION="übersprungen (existiert nicht)"
            fi
          fi

          echo ">> Rollback abgeschlossen für ${ENV_NAME}"

          {
            echo "### Rollback ${ENV_NAME} (${HOST}:${PORT})"
            echo ""
            echo "| Ressource | Aktion |"
            echo "|-----------|--------|"
            echo "| Datenbank \`${APP_DB}\` | ${DB_ACTION} |"
            echo "| Rolle \`${APP_USER}\` | ${ROLE_ACTION} |"
          } >> "$GITHUB_STEP_SUMMARY"

          exit "${rollback_failed}"

      - name: Kein Pre-State vorhanden
        if: steps.resolve.outputs.action != 'skip' && steps.download_state.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          echo "Kein Pre-State-Artifact für ${ENV_NAME} — keine DB-Änderungen zum Zurückrollen"
          {
            echo "### Rollback ${ENV_NAME}"
            echo ""
            echo "Kein Pre-State vorhanden — Provisioning wurde nicht gestartet oder Pre-State konnte nicht erfasst werden."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          ENV_NAME: ${{ matrix.env_name }}

      - name: Temporäre Regel entfernen (Rollback)
        if: always() && steps.resolve.outputs.action != 'skip'
        env:
          CIVO_API_KEY: ${{ secrets.CIVO_API_KEY }}
          FIREWALL_NAME: ${{ matrix.firewall_name }}
        shell: bash
        run: |
          set -euo pipefail
          command -v civo >/dev/null || exit 0
          civo region use fra1 || true
          mapfile -t rule_ids < <(
            civo firewall rule ls "$FIREWALL_NAME" --output json \
            | jq -r --arg lbl "tmp-gha-rb-${GITHUB_RUN_ID}" '.[] | select(.label == $lbl) | .id'
          )
          for rid in "${rule_ids[@]}"; do
            [[ -n "$rid" ]] && civo firewall rule remove "$FIREWALL_NAME" "$rid" --yes
          done


  summary:
    needs: provision
    if: ${{ needs.provision.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all summaries
        uses: actions/download-artifact@v4
        with:
          path: summaries

      - name: Build combined summary
        shell: bash
        run: |
          set -euo pipefail
          echo "## Gesamtübersicht" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Umgebung | Host | Benutzer | Datenbank | Schema | Aktion |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|----------|-----------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"

          shopt -s globstar nullglob
          found=0
          jdbc_lines=""
          for f in summaries/**/summary_row_*.txt; do
            found=1
            IFS='|' read -r ENV HOSTPORT USER DB SCHEMA ACTION JDBC < "$f"
            echo "| ${ENV} | ${HOSTPORT} | ${USER} | ${DB} | ${SCHEMA} | ${ACTION} |" >> "$GITHUB_STEP_SUMMARY"
            jdbc_lines="${jdbc_lines}\n**${ENV}:**\n\`\`\`\n${JDBC}\n\`\`\`\n"
          done

          if [[ "$found" -eq 0 ]]; then
            echo "_Keine Umgebungen provisioniert (alle auf skip)._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## JDBC Connection Strings" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo -e "${jdbc_lines}" >> "$GITHUB_STEP_SUMMARY"
          fi
