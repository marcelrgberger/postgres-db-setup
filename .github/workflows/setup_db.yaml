name: Provision App on Dev, Test and Prod Postgres Servers

concurrency:
  group: postgres-provision-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Base application name (e.g. myapp)"
        required: true
        type: string
      dev_password:
        description: "Password for dev user"
        required: true
      test_password:
        description: "Password for test user"
        required: true
      prod_password:
        description: "Password for prod user"
        required: true
jobs:
  provision:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - server: dev
            env_name: dev
            host: ${{ vars.DEV_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: DEV_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.DEV_FIREWALL_NAME }}
          - server: test
            env_name: test
            host: ${{ vars.TEST_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: TEST_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.TEST_FIREWALL_NAME }}
          - server: prod
            env_name: prod
            host: ${{ vars.PROD_SERVER_HOST }}
            port: 5432
            admin_user: ${{ vars.ADMIN_USER }}
            admin_secret: PROD_SERVER_ADMIN_PASSWORD
            firewall_name: ${{ vars.PROD_FIREWALL_NAME }}

    steps:
      - name: Install Civo CLI
        run: |
          curl -Ls https://civo.com/get | sh

      - name: Add Civo API key
        run: civo apikey save ci-civo "$CIVO_API_KEY"
        env:
          CIVO_API_KEY: ${{ secrets.CIVO_API_KEY }}

      - name: Detect runner public IPv4
        id: detect_ip
        shell: bash
        run: |
          set -euo pipefail

          is_ipv4() {
            [[ "$1" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]] || return 1
            IFS='.' read -r a b c d <<< "$1"
            [[ $a -le 255 && $b -le 255 && $c -le 255 && $d -le 255 ]]
          }

          IP="$(
            (
              curl -fsSL https://api.ipify.org \
              || curl -fsSL https://ipv4.icanhazip.com \
              || curl -fsSL https://ifconfig.me \
              || (dig +short -4 TXT o-o.myaddr.l.google.com @ns1.google.com | tr -d '"')
            ) 2>/dev/null | tr -d '\n'
          )"

          if ! is_ipv4 "${IP:-}"; then
            echo "Konnte öffentliche IPv4 nicht ermitteln." >&2
            exit 1
          fi

          echo "Runner IPv4: ${IP}"
          echo "ip=${IP}" >> "$GITHUB_OUTPUT"

      #Create temp firewall rule to open port 6443
      - name: Temporär Port 5432 öffnen
        env:
          FIREWALL_NAME: ${{ matrix.firewall_name }}
        run: |
          set -euo pipefail
          civo region use fra1
          SRC_CIDR="${{ steps.detect_ip.outputs.ip }}/32"
          LABEL="tmp-github-runner-access"
          echo "Erlaube TCP 5432 von ${SRC_CIDR} in Firewall ${FIREWALL_NAME}"
          civo firewall rule create "$FIREWALL_NAME" \
            -s 5432 \
            -c "${SRC_CIDR}" \
            -l "${LABEL}"

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Provision app on ${{ matrix.server }} (${{ matrix.host }}:${{ matrix.port }})
        env:
          APP_NAME: ${{ inputs.app_name }}
          HOST: ${{ matrix.host }}
          PORT: ${{ matrix.port }}
          ADMIN_USER: ${{ matrix.admin_user }}
          ADMIN_PW: ${{ secrets[matrix.admin_secret] }}
          ENV_NAME: ${{ matrix.env_name }}
          DEV_PASSWORD: ${{ inputs.dev_password }}
          TEST_PASSWORD: ${{ inputs.test_password }}
          PROD_PASSWORD: ${{ inputs.prod_password }}
          PGSSLMODE: require
        shell: bash
        run: |
          set -euo pipefail

          PORT="5432"
          ADMIN_USER="${ADMIN_USER:-postgres}"

          if [[ -z "${APP_NAME}" || -z "${HOST}" || -z "${ADMIN_PW}" ]]; then
            echo "Missing required inputs"; exit 1
          fi

          case "${ENV_NAME}" in
            dev)  APP_PW="${DEV_PASSWORD}" ;;
            test) APP_PW="${TEST_PASSWORD}" ;;
            prod) APP_PW="${PROD_PASSWORD}" ;;
            *) echo "Unknown ENV_NAME '${ENV_NAME}'"; exit 1 ;;
          esac
          if [[ -z "${APP_PW}" ]]; then echo "APP_PW empty"; exit 1; fi

          echo "::add-mask::${ADMIN_PW}"
          echo "::add-mask::${APP_PW}"

          APP_USER="${APP_NAME}_user"
          APP_DB="${APP_NAME}_db"

          echo "=== Provision ${APP_NAME} on ${HOST}:${PORT} as ${ADMIN_USER} (${ENV_NAME}) ==="

          # Safe quoting
          sql_literal() { printf "%s" "$1" | sed "s/'/''/g"; }
          Q_APP_USER="$(sql_literal "${APP_USER}")"
          Q_APP_DB="$(sql_literal "${APP_DB}")"
          Q_APP_PW="$(sql_literal "${APP_PW}")"

          export PGPASSWORD="${ADMIN_PW}"
          CONN_ADMIN="host=${HOST} port=${PORT} user=${ADMIN_USER} dbname=postgres sslmode=require connect_timeout=20"

          psql_exec() {
            psql "$1" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "$2"
          }

          echo ">> ensure role ${APP_USER}"
          psql_exec "${CONN_ADMIN}" "
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${APP_USER}') THEN
              EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${APP_USER}', '${APP_PW}');
            ELSE
              EXECUTE format('ALTER ROLE %I WITH ENCRYPTED PASSWORD %L', '${APP_USER}', '${APP_PW}');
            END IF;
          END
          \$\$;
          "

          echo ">> ensure database ${APP_DB}"
          DB_EXISTS=$(psql "${CONN_ADMIN}" -tA -c "SELECT 1 FROM pg_database WHERE datname = '${APP_DB}'" || true)
          if [[ "${DB_EXISTS}" != "1" ]]; then
            psql_exec "${CONN_ADMIN}" "CREATE DATABASE \"${APP_DB}\" ENCODING 'UTF8' TEMPLATE template1"
          else
            echo "Database ${APP_DB} already exists"
          fi

          echo ">> grant database privileges (CONNECT, TEMP, CREATE) to ${APP_USER} on ${APP_DB}"
          psql_exec "${CONN_ADMIN}" "
            REVOKE CONNECT ON DATABASE \"${APP_DB}\" FROM PUBLIC;
            GRANT CONNECT, TEMP, CREATE ON DATABASE \"${APP_DB}\" TO \"${APP_USER}\";
          "

          # Ab hier: Admin verbindet sich in die App-DB und setzt die Rechte auf das public-Schema
          echo ">> grant public schema privileges in ${APP_DB} (as admin)"
          CONN_ADMIN_APPDB="host=${HOST} port=${PORT} user=${ADMIN_USER} dbname=${APP_DB} sslmode=require connect_timeout=20"

          retry_admin_appdb() {
            local tries="${1:-15}" sleep_s="${2:-10}"
            local i=1
            while (( i <= tries )); do
              if psql "${CONN_ADMIN_APPDB}" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "SELECT current_database();" >/dev/null 2>&1; then
                return 0
              fi
              echo "Admin-Login auf ${APP_DB} noch nicht möglich (Versuch ${i}/${tries}); warte ${sleep_s}s ..."
              sleep "${sleep_s}"
              (( sleep_s < 60 )) && sleep_s=$(( sleep_s * 2 ))
              (( i++ ))
            done
            return 1
          }

          if retry_admin_appdb 15 10; then
            psql "${CONN_ADMIN_APPDB}" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "REVOKE CREATE ON SCHEMA public FROM PUBLIC"
            psql "${CONN_ADMIN_APPDB}" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "GRANT USAGE, CREATE ON SCHEMA public TO \"${APP_USER}\""
            psql "${CONN_ADMIN_APPDB}" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO \"${APP_USER}\""
            psql "${CONN_ADMIN_APPDB}" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO \"${APP_USER}\""
            psql "${CONN_ADMIN_APPDB}" --set=ON_ERROR_STOP=1 -v VERBOSITY=terse -c "GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO \"${APP_USER}\""
          else
            echo "WARN: Admin-Login auf ${APP_DB} weiterhin blockiert. Überspringe public-Grants; später erneut versuchen."
          fi

          echo ">> done"


  summary:
    needs: provision
    runs-on: ubuntu-latest
    steps:
      - name: Download all summaries
        uses: actions/download-artifact@v4
        with:
          path: summaries

      - name: Build combined summary
        shell: bash
        run: |
          set -euo pipefail
          echo "## Gesamtübersicht" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Umgebung | Host | Benutzer | Datenbank | Schema |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|----------|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          
          shopt -s globstar nullglob
          found=0
          for f in summaries/**/summary_row_*.txt; do
            found=1
            IFS='|' read -r ENV HOSTPORT USER DB SCHEMA < "$f"
            echo "| ${ENV} | ${HOSTPORT} | ${USER} | ${DB} | ${SCHEMA} |" >> "$GITHUB_STEP_SUMMARY"
          done
          
          if [[ "$found" -eq 0 ]]; then
            echo "_Keine Einträge gefunden._" >> "$GITHUB_STEP_SUMMARY"
          fi